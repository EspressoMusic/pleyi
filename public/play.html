<!DOCTYPE html>
<html lang="he" dir="rtl" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#00C9B7" />
  <title>Game — Pleyi</title>
  <meta name="description" content="Learning games — solo practice or live lesson with your teacher"/>
  <link rel="stylesheet" href="/styles.css"/>
  <link rel="stylesheet" href="/css/room-page.css"/>
  <link rel="stylesheet" href="/css/play.css"/>
  <link rel="stylesheet" href="/css/premium.css"/>
  <link rel="stylesheet" href="/css/legal.css"/>
  <link rel="stylesheet" href="/css/accessibility.css" />
</head>
<body class="play-body">
  <div class="play-shell">
    <div class="play-main-block">
      <div class="play-top-strip room-top-strip" id="playTopStrip">
        <div class="play-top-strip-stats room-top-strip-stats">
          <span class="room-stat-pill hidden" id="playRoomCodePill">קוד: <strong id="playRoomCode" dir="ltr">------</strong></span>
          <span class="room-stat-pill">ניקוד: <strong id="playScore">0</strong></span>
          <span class="room-stat-pill" id="playGameNamePill"></span>
          <a href="/room" class="room-stat-pill play-room-link hidden" id="playRoomLink">פתח חדר</a>
        </div>
        <div class="play-top-strip-actions room-top-strip-actions">
          <button type="button" class="room-stat-pill room-stat-pill--games-btn" id="playGamesBtn" aria-expanded="false" aria-controls="playGamesPanel">בחרו משחק</button>
          <button type="button" class="room-stat-pill room-stat-pill--settings-btn" id="openPlaySettingsBtn" aria-expanded="false" aria-controls="playSettingsPanel">הגדרות</button>
          <button type="button" class="room-stat-pill room-stat-pill--exit-btn" id="playExitBtn">יציאה</button>
        </div>
      </div>

      <h1 class="visually-hidden" id="playTitle">Game</h1>
      <main id="playRoot" class="play-root"></main>
    </div>
  </div>

  <div class="room-games-panel room-page-overlay hidden" id="playGamesPanel" role="dialog" aria-modal="true" aria-labelledby="playGamesPanelTitle">
    <div class="room-games-panel-backdrop" id="playGamesPanelBackdrop"></div>
    <div class="room-games-panel-sheet">
      <div class="room-games-panel-header">
        <h2 id="playGamesPanelTitle">בחירת משחק</h2>
        <button type="button" class="room-games-panel-close" id="closePlayGamesBtn" aria-label="סגירה">×</button>
      </div>
      <div class="room-games-panel-body">
        <div class="room-game-picker" id="playGamePicker"></div>
      </div>
      <div class="room-games-panel-footer">
        <a href="/games" class="room-games-library-btn btn-candy">לספריית המשחקים</a>
      </div>
    </div>
  </div>

  <div class="room-settings-panel room-page-overlay hidden" id="playSettingsPanel" role="dialog" aria-modal="true" aria-labelledby="playSettingsTitle">
    <div class="room-settings-panel-backdrop" id="playSettingsBackdrop"></div>
    <div class="room-settings-panel-sheet">
      <div class="room-games-panel-header">
        <h2 id="playSettingsTitle" class="visually-hidden">תפריט הגדרות</h2>
        <button type="button" class="room-games-panel-close" id="closePlaySettingsBtn" aria-label="סגירה">×</button>
      </div>
      <div class="room-settings-list" id="playSettingsList"></div>
    </div>
  </div>

  <div class="room-material-panel room-page-overlay hidden" id="playMaterialPanel" role="dialog" aria-modal="true" aria-labelledby="playMaterialPanelTitle">
    <div class="room-material-panel-backdrop" id="playMaterialPanelBackdrop"></div>
    <div class="room-material-panel-sheet">
      <div class="room-games-panel-header">
        <h2 id="playMaterialPanelTitle">חומר לימודי</h2>
        <button type="button" class="room-games-panel-close" id="closePlayMaterialBtn" aria-label="סגירה">×</button>
      </div>
      <p class="room-material-ai-hint">הדביקו טקסט מהשיעור — AI יהפוך אותו לזוגות למשחק</p>
      <textarea id="playMaterialInput" class="room-material-textarea" rows="10" placeholder="הדביקו תוכן שיעור או זוגות מוכנים:&#10;apple=תפוח&#10;book=ספר"></textarea>
      <div class="room-material-actions">
        <button type="button" class="btn btn-candy btn-full room-material-save-btn" id="playSaveMaterialBtn">הכנת שיעור</button>
        <button type="button" class="btn btn-candy btn-full room-material-cancel-btn" id="playCancelMaterialBtn">ביטול</button>
      </div>
    </div>
  </div>

  <div class="toast hidden" id="playToast" role="status"></div>

  <footer class="site-footer-mini">
    <nav class="site-legal-nav" aria-label="מידע משפטי">
      <a href="/legal/terms.html">תקנון</a>
      <a href="/legal/privacy.html">פרטיות</a>
      <a href="/legal/cookies.html">עוגיות</a>
      <a href="/legal/accessibility.html">נגישות</a>
    </nav>
  </footer>

  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="/js/firebase-app.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/user-data.js"></script>
  <script src="/js/premium.js"></script>
  <script src="/js/vocab-data.js"></script>
  <script src="/js/math-data.js"></script>
  <script src="/js/parse-content.js"></script>
  <script src="/js/ai-lesson.js"></script>
  <script src="/js/games-catalog.js"></script>
  <script src="/js/game-content.js"></script>
  <script src="/js/game-engine.js"></script>
  <script src="/js/tower-stack-pro.js"></script>
  <script src="/js/math-blitz-pro.js"></script>
  <script src="/js/solo-games.js"></script>
  <script src="/js/play-settings.js"></script>
  <script src="/js/play-chrome.js"></script>
  <script src="/js/play.js"></script>
  <script src="/js/cookie-consent.js"></script>
</body>
</html>
