<!DOCTYPE html>
<html lang="he" dir="rtl" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#00C9B7" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="format-detection" content="telephone=no" />
  <title>הצטרפות — Pleyi</title>
  <meta name="description" content="הצטרפו למשחק בכיתה — הזינו קוד חדר או סרקו QR מהמורה"/>
  <link rel="stylesheet" href="/styles.css?v=28"/>
  <link rel="stylesheet" href="/css/join.css?v=17"/>
  <link rel="stylesheet" href="/css/legal.css"/>
  <link rel="stylesheet" href="/css/accessibility.css" />
</head>
<body class="join-body">

  <header class="join-header">
    <a href="/" class="join-back">← ראשי</a>
  </header>

  <main class="join-main" id="joinScreen">
    <div class="join-card">
      <h1 class="font-cartoon">הצטרפות למשחק</h1>
      <p class="join-lead">הזינו את קוד החדר שקיבלתם מהמורה והשם שלכם</p>
      <form id="joinForm" class="join-form">
        <label>
          <span>קוד חדר (6 ספרות)</span>
          <input type="text" id="joinCode" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" placeholder="123456" required />
        </label>
        <label>
          <span>השם שלך</span>
          <input type="text" id="joinName" maxlength="24" placeholder="למשל: דנה" required />
        </label>
        <p class="join-error hidden" id="joinError"></p>
        <button type="submit" class="join-submit">הצטרף למשחק</button>
      </form>
    </div>
  </main>

  <main class="guest-room hidden" id="studentRoom">
    <div class="guest-room-panel">
      <div class="guest-room-top">
        <div class="guest-top-strip">
          <div class="guest-top-strip-info">
            <span class="guest-stat-pill">אורח/ת</span>
            <span class="guest-stat-pill guest-stat-pill--name"><span id="studentWelcome">שלום!</span></span>
            <span class="guest-stat-pill">קוד: <strong id="studentCode" dir="ltr">------</strong></span>
          </div>
          <button type="button" class="guest-stat-pill guest-leave-btn" id="joinLeave">עזוב</button>
        </div>
      </div>

      <div class="guest-game-stage">
      <div class="guest-waiting" id="studentWaiting">
        <div class="join-pulse"></div>
        <p>ממתינים שהמורה יתחיל משחק...</p>
        <p class="guest-wait-hint">השאירו את המסך פתוח — תיכנסו אוטומטית למשחק</p>
      </div>
      <div class="guest-suspended hidden" id="studentSuspended">
        <p>⏸ הושהיתם על ידי המורה</p>
      </div>
      <div class="guest-game hidden" id="studentGame">
        <div id="studentGameContent"></div>
      </div>
    </div>
    </div>

    <div class="guest-participants-wrap" id="guestParticipantsWrap">
      <h3 class="guest-participants-title">משתתפים</h3>
      <div class="guest-participants-strip" id="guestParticipantsStrip" aria-live="polite"></div>
    </div>

    <div class="guest-chat-wrap hidden" id="guestChatWrap">
      <div class="guest-chat-log room-chat-log" id="studentChatLog" aria-live="polite"></div>
      <div class="room-emoji-bar hidden" id="studentEmojiBar">
        <button type="button" data-emoji="👍">👍</button>
        <button type="button" data-emoji="🎉">🎉</button>
        <button type="button" data-emoji="❤️">❤️</button>
        <button type="button" data-emoji="😂">😂</button>
        <button type="button" data-emoji="🔥">🔥</button>
        <button type="button" data-emoji="👏">👏</button>
        <button type="button" data-emoji="⭐">⭐</button>
      </div>
    </div>
  </main>

  <div class="toast hidden" id="toast"></div>

  <footer class="site-footer-mini">
    <nav class="site-legal-nav" aria-label="מידע משפטי">
      <a href="/legal/terms.html">תקנון</a>
      <a href="/legal/privacy.html">פרטיות</a>
      <a href="/legal/cookies.html">עוגיות</a>
      <a href="/legal/accessibility.html">נגישות</a>
    </nav>
  </footer>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/game-engine.js"></script>
  <script src="/js/games.js?v=18"></script>
  <script src="/js/join.js?v=8"></script>
  <script src="/js/cookie-consent.js"></script>
</body>
</html>
