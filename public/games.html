<!DOCTYPE html>
<html lang="he" dir="rtl" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#00C9B7" />
  <title>משחקים — Pleyi</title>
  <meta name="description" content="ספריית משחקי למידה לפי נושאים — אנגלית, מתמטיקה, והתאמה אישית לתוכן השיעור"/>
  <link rel="stylesheet" href="/styles.css"/>
  <link rel="stylesheet" href="/css/games-hub.css"/>
  <link rel="stylesheet" href="/css/premium.css"/>
  <link rel="stylesheet" href="/css/credits.css"/>
  <link rel="stylesheet" href="/css/legal.css"/>
  <link rel="stylesheet" href="/css/accessibility.css" />
</head>
<body class="hub-body memphis-body">

  <div class="memphis-bg hub-memphis-bg" aria-hidden="true">
    <span class="hub-memphis-sticker hub-memphis-sticker--purple"></span>
    <span class="hub-memphis-sticker hub-memphis-sticker--yellow"></span>
    <span class="hub-memphis-sticker hub-memphis-sticker--pink"></span>
    <span class="hub-memphis-sticker hub-memphis-sticker--teal"></span>
    <span class="hub-memphis-sticker hub-memphis-sticker--orange"></span>
    <span class="hub-memphis-sticker hub-memphis-sticker--lime"></span>
    <span class="hub-memphis-sticker hub-memphis-sticker--mint"></span>
    <span class="hub-memphis-sticker hub-memphis-sticker--coral"></span>
  </div>

  <header class="navbar scrolled" id="navbar">
    <div class="container nav-inner">
      <nav class="nav-links">
        <a href="/" class="nav-pill" data-i18n="nav.home">בית</a>
      </nav>
      <div class="nav-actions">
        <button type="button" class="lang-toggle lang-toggle--sm" data-lang-toggle data-i18n="lang.switch" aria-label="English">EN</button>
        <button type="button" class="nav-auth-btn" id="authLoginBtn" data-i18n="nav.login">התחברות</button>
        <div class="nav-user hidden" id="authUserMenu">
          <button type="button" class="nav-user-avatar" id="authUserAvatar" aria-label="תפריט משתמש" aria-haspopup="true" aria-expanded="false">
            <img id="authUserPhoto" alt="" width="48" height="48" referrerpolicy="no-referrer" />
            <span class="nav-user-initial hidden" id="authUserInitial" aria-hidden="true"></span>
          </button>
          <div class="nav-user-dropdown hidden" id="authUserDropdown" role="menu">
            <p class="nav-user-name" id="authUserName"></p>
            <a href="/my-room" class="nav-user-link" role="menuitem">חדר המורה</a>
            <button type="button" class="nav-user-logout" id="authLogoutBtn" role="menuitem">יציאה</button>
          </div>
        </div>
        <button type="button" class="menu-toggle" id="menuToggle" aria-label="תפריט" aria-expanded="false" aria-controls="mobileNav"><span></span><span></span><span></span></button>
      </div>
    </div>
  </header>

  <nav class="mobile-nav" id="mobileNav" aria-label="ניווט ראשי">
    <a href="/" data-i18n="nav.home">בית</a>
    <button type="button" class="mobile-nav-auth" id="mobileLoginBtn" data-i18n="nav.login">התחברות</button>
  </nav>

  <main class="hub-main container">
    <a href="/" class="hub-back hub-back--home" data-i18n="hub.backHome">← בית</a>

    <div class="hub-grid cards cols-3" id="gamesGrid"></div>
  </main>

  <!-- Custom game builder -->
  <div class="modal-overlay hidden" id="customGameModal">
    <div class="modal modal-custom-game">
      <button class="modal-close" id="customModalClose" type="button" aria-label="סגירה">×</button>
      <h2 class="font-cartoon modal-custom-title">התאמה אישית</h2>
      <form class="hub-custom-form" id="customGameForm">
        <div class="hub-custom-simple">
          <div class="hub-custom-input-box" id="customInputBox">
            <textarea id="customContent" placeholder="הדביקו כאן את תוכן השיעור…&#10;&#10;apple — תפוח&#10;book — ספר"></textarea>
            <input type="file" id="customFileInput" accept=".txt,.csv,.md,.pdf,.docx,text/plain,application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document" hidden />
            <button type="button" class="hub-custom-attach-btn" id="customFileBtn" aria-label="העלאת קובץ">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
            <span class="hub-custom-file-name" id="customFileName"></span>
          </div>
          <button type="submit" class="btn btn-primary btn-candy btn-full font-cartoon hub-custom-create-btn" id="customCreateBtn">יצירת משחק</button>
          <p class="hub-custom-quota hidden" id="customGameQuota" aria-live="polite"></p>
        </div>

        <div class="hub-custom-advanced hidden" id="customAdvancedPanel">
          <h3 class="hub-custom-advanced-heading font-cartoon">הגדרות מתקדמות</h3>
          <div class="hub-custom-field">
            <h3 class="hub-custom-field-title">שם המשחק</h3>
            <input type="text" id="customTitle" placeholder="למשל: אוצר מילים — יחידה 3" maxlength="80" />
          </div>
          <div class="hub-custom-field">
            <h3 class="hub-custom-field-title">נושא</h3>
            <select id="customSubject">
              <option value="english">אנגלית — מילה = תרגום</option>
              <option value="lifeskills" disabled>כישורי חיים — מושג = הסבר (בקרוב)</option>
              <option value="math">מתמטיקה — תרגיל = תשובה</option>
              <option value="science" disabled>מדעים — מושג = הגדרה (בקרוב)</option>
            </select>
          </div>
          <div class="hub-custom-field">
            <h3 class="hub-custom-field-title">סוג משחק</h3>
            <select id="customGamePick">
              <option value="auto">בחירה אוטומטית (מומלץ)</option>
            </select>
          </div>
          <div class="hub-custom-actions">
            <button type="button" class="btn btn-ai btn-candy hidden" id="customAiGenerateBtn" data-ai-generate>✨ צור עם AI</button>
            <button type="button" class="btn btn-outline btn-candy" id="customExampleBtn">טען דוגמה</button>
          </div>
          <div class="hub-preview" id="customPreview"></div>
        </div>
      </form>
    </div>
  </div>

  <!-- Game info -->
  <div class="modal-overlay hidden" id="gameInfoModal">
    <div class="modal modal-game-info">
      <button class="modal-close" id="gameInfoClose" type="button" aria-label="סגירה">×</button>
      <header class="game-info-head">
        <span class="game-info-icon" id="gameInfoIcon" aria-hidden="true">🎮</span>
        <h2 class="font-cartoon game-info-title" id="gameInfoTitle">משחק</h2>
      </header>
      <div class="game-info-body">
        <section class="game-info-panel">
          <div class="game-info-panel-head">
            <span class="game-info-panel-icon" aria-hidden="true">📖</span>
            <h3>על המשחק</h3>
          </div>
          <p id="gameInfoAbout"></p>
        </section>
        <section class="game-info-panel">
          <div class="game-info-panel-head">
            <span class="game-info-panel-icon" aria-hidden="true">🎯</span>
            <h3>תוכן שנלמד</h3>
          </div>
          <p id="gameInfoContent"></p>
        </section>
        <section class="game-info-panel game-info-panel--skills">
          <div class="game-info-panel-head">
            <span class="game-info-panel-icon" aria-hidden="true">⭐</span>
            <h3>מיומנויות</h3>
          </div>
          <div class="game-info-tags" id="gameInfoSkills"></div>
        </section>
      </div>
    </div>
  </div>

  <!-- Login -->
  <div class="modal-overlay hidden" id="loginModal">
    <div class="modal modal-login">
      <button class="modal-close" id="loginClose" type="button">×</button>
      <h2>התחברות</h2>
      <button type="button" id="googleSignInBtn" class="btn btn-google btn-full">
        <span class="btn-google-icon" aria-hidden="true">
          <svg width="20" height="20" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          </svg>
        </span>
        התחברות עם Google
      </button>
      <p class="form-error hidden" id="loginError"></p>
    </div>
  </div>

  <div class="toast hidden" id="toast"></div>

  <footer class="site-footer-mini">
    <nav class="site-legal-nav" aria-label="מידע משפטי">
      <a href="/legal/terms.html">תקנון</a>
      <a href="/legal/privacy.html">פרטיות</a>
      <a href="/legal/cookies.html">עוגיות</a>
      <a href="/legal/accessibility.html">נגישות</a>
    </nav>
  </footer>

  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="/js/firebase-app.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/user-data.js"></script>
  <script src="/js/credits.js"></script>
  <script src="/js/premium.js"></script>
  <script src="/js/parse-content.js"></script>
  <script src="/js/ai-lesson.js"></script>
  <script src="/js/games-catalog.js"></script>
  <script src="/js/game-content.js"></script>
  <script src="/js/file-extract.js"></script>
  <script src="/js/games-hub.js"></script>
  <script src="/js/i18n.js"></script>
  <script src="/js/hub-nav.js"></script>
  <script src="/js/cookie-consent.js"></script>
</body>
</html>
